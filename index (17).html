<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1f2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="حضور">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>نظام الحضور</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0f1319;
    --surface: #1a2035;
    --surface2: #212a40;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --success: #2ecc71;
    --warning: #f39c12;
    --danger: #e74c3c;
    --text: #e8eaf0;
    --text-dim: #8892a4;
    --border: rgba(79,142,247,0.15);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ====== AUTH SCREEN ====== */
  #auth-screen {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(ellipse at 50% 0%, rgba(79,142,247,0.12) 0%, transparent 65%);
  }

  .auth-logo {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(79,142,247,0.3);
  }

  .auth-title {
    font-size: 28px;
    font-weight: 900;
    margin-bottom: 6px;
    text-align: center;
  }

  .auth-sub {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 36px;
    text-align: center;
  }

  .auth-card {
    width: 100%;
    max-width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
  }

  .field-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }

  .field-input:focus {
    border-color: var(--accent);
  }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius-sm);
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ====== MAIN APP ====== */
  #app-screen { display: none; min-height: 100dvh; flex-direction: column; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky; top: 0; z-index: 100;
  }

  .top-bar-title { font-size: 18px; font-weight: 700; }
  .top-bar-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 18px;
    width: 40px; height: 40px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .icon-btn:hover { background: var(--border); }

  .app-content {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
  }

  /* ====== DATE CARD ====== */
  .date-card {
    background: linear-gradient(135deg, rgba(79,142,247,0.12), rgba(124,92,191,0.12));
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .date-icon { font-size: 28px; }
  .date-text { font-size: 20px; font-weight: 700; }
  .date-hijri { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* ====== SCAN SECTION ====== */
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .scan-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    margin-bottom: 20px;
    transition: border-color 0.3s;
    cursor: pointer;
  }

  .scan-zone.active { border-color: var(--accent); border-style: solid; }
  .scan-zone:hover { border-color: rgba(79,142,247,0.4); }

  #video-container {
    display: none;
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    margin: 0 -4px;
  }

  #video-container video {
    width: 100%;
    display: block;
    max-height: 280px;
    object-fit: cover;
  }

  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .scan-frame {
    width: 180px; height: 180px;
    border: 3px solid var(--accent);
    border-radius: 16px;
    position: relative;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
  }

  .scan-line {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 2s ease-in-out infinite;
  }

  @keyframes scan {
    0% { top: 0; }
    50% { top: calc(100% - 2px); }
    100% { top: 0; }
  }

  .scan-zone-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .scan-big-icon { font-size: 40px; }
  .scan-hint { color: var(--text-dim); font-size: 14px; }
  .scan-btn-text { font-size: 15px; font-weight: 600; color: var(--accent); }

  .stop-btn {
    margin-top: 12px;
    background: rgba(231,76,60,0.15);
    border: 1px solid rgba(231,76,60,0.3);
    border-radius: var(--radius-sm);
    color: var(--danger);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 20px;
    cursor: pointer;
    width: 100%;
  }

  /* ====== TOAST ====== */
  #toast {
    position: fixed;
    top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    pointer-events: none;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #toast.success { border-color: rgba(46,204,113,0.4); color: var(--success); }
  #toast.error { border-color: rgba(231,76,60,0.4); color: var(--danger); }
  #toast.info { border-color: rgba(79,142,247,0.4); color: var(--accent); }

  /* ====== STATS ROW ====== */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 10px;
    text-align: center;
  }

  .stat-num { font-size: 24px; font-weight: 900; }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .stat-card.present .stat-num { color: var(--success); }
  .stat-card.absent .stat-num { color: var(--danger); }
  .stat-card.total .stat-num { color: var(--accent); }

  /* ====== STUDENT LIST ====== */
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .export-btn {
    background: rgba(46,204,113,0.12);
    border: 1px solid rgba(46,204,113,0.3);
    border-radius: var(--radius-sm);
    color: var(--success);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 14px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }

  .student-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.3s;
  }

  .student-item.present { border-color: rgba(46,204,113,0.35); }

  .student-avatar {
    width: 42px; height: 42px;
    border-radius: 12px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }

  .student-item.present .student-avatar {
    background: rgba(46,204,113,0.12);
    color: var(--success);
  }

  .student-info { flex: 1; min-width: 0; }
  .student-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .student-id { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .present-badge {
    background: rgba(46,204,113,0.15);
    border: 1px solid rgba(46,204,113,0.3);
    color: var(--success);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 700;
  }

  .time-badge {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  /* ====== TABS ====== */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }

  /* ====== ADMIN: ADD STUDENTS ====== */
  .add-student-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .form-row { display: flex; gap: 10px; }

  .qr-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .qr-img-wrap {
    width: 70px; height: 70px;
    background: #fff;
    border-radius: 8px;
    padding: 4px;
    flex-shrink: 0;
  }

  .qr-img-wrap img { width: 100%; height: 100%; }

  .qr-info { flex: 1; }
  .qr-name { font-size: 15px; font-weight: 700; }
  .qr-id { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .print-btn {
    background: rgba(79,142,247,0.12);
    border: 1px solid rgba(79,142,247,0.25);
    border-radius: 8px;
    color: var(--accent);
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 12px;
    cursor: pointer;
    white-space: nowrap;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    margin-bottom: 14px;
  }

  .search-input:focus { border-color: var(--accent); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ====== LOADING ====== */
  .loading { text-align: center; padding: 30px; color: var(--text-dim); }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ====== QR PRINT PAGE ====== */
  @media print {
    body > *:not(#print-area) { display: none !important; }
    #print-area {
      display: grid !important;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 16px;
    }
    .print-card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      page-break-inside: avoid;
    }
    .print-card img { width: 110px; height: 110px; }
    .print-card .pname { font-family: Arial; font-size: 14px; font-weight: bold; margin-top: 6px; }
    .print-card .pid { font-family: Arial; font-size: 11px; color: #666; }
  }

  #print-area { display: none; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">📋</div>
  <div class="auth-title">نظام الحضور</div>
  <div class="auth-sub">تسجيل الحضور بالـ QR بسرعة وسهولة</div>
  <div class="auth-card">
    <label class="field-label">البريد الإلكتروني</label>
    <input type="email" id="login-email" class="field-input" placeholder="example@gmail.com" dir="ltr">
    <label class="field-label">كلمة المرور</label>
    <input type="password" id="login-pass" class="field-input" placeholder="••••••••" dir="ltr">
    <button class="btn-primary" id="login-btn" onclick="doLogin()">دخول</button>
    <div id="login-error" style="color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none;"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-screen">
  <div class="top-bar">
    <div>
      <div class="top-bar-title">📋 الحضور</div>
      <div class="top-bar-sub" id="user-email-display"></div>
    </div>
    <button class="icon-btn" onclick="doLogout()" title="خروج">🚪</button>
  </div>

  <div class="app-content">

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('attendance',this)">تسجيل الحضور</button>
      <button class="tab" onclick="switchTab('students',this)">الطلاب</button>
    </div>

    <!-- ATTENDANCE TAB -->
    <div id="tab-attendance">
      <!-- Date -->
      <div class="date-card">
        <div class="date-icon">📅</div>
        <div>
          <div class="date-text" id="today-date"></div>
          <div class="date-hijri" id="today-day"></div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card total">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-label">إجمالي</div>
        </div>
        <div class="stat-card present">
          <div class="stat-num" id="stat-present">0</div>
          <div class="stat-label">حاضر</div>
        </div>
        <div class="stat-card absent">
          <div class="stat-num" id="stat-absent">0</div>
          <div class="stat-label">غائب</div>
        </div>
      </div>

      <!-- Scan Zone -->
      <p class="section-title">مسح QR</p>
      <div class="scan-zone" id="scan-zone" onclick="startScan()">
        <div id="scan-placeholder" class="scan-zone-placeholder">
          <div class="scan-big-icon">📷</div>
          <div class="scan-btn-text">افتح الكاميرا</div>
          <div class="scan-hint">اسكن QR الطالب لتسجيل حضوره</div>
        </div>
        <div id="video-container">
          <video id="scanner-video" autoplay playsinline muted></video>
          <div class="scan-overlay">
            <div class="scan-frame"><div class="scan-line"></div></div>
          </div>
        </div>
      </div>
      <button class="stop-btn" id="stop-btn" onclick="stopScan()" style="display:none">⏹ إيقاف الكاميرا</button>

      <!-- Student List Today -->
      <div class="list-header">
        <p class="section-title" style="margin:0">قائمة اليوم</p>
        <button class="export-btn" onclick="exportExcel()">📥 Excel</button>
      </div>
      <div id="today-list">
        <div class="loading"><div class="spinner"></div>جاري التحميل…</div>
      </div>
    </div>

    <!-- STUDENTS TAB -->
    <div id="tab-students" style="display:none">
      <div class="add-student-form">
        <p class="section-title">إضافة طالب جديد</p>
        <input type="text" id="new-name" class="field-input" placeholder="اسم الطالب بالكامل">
        <input type="text" id="new-grade" class="field-input" placeholder="الصف / الفصل (اختياري)">
        <div class="form-row">
          <button class="btn-primary" onclick="addStudent()">➕ إضافة</button>
          <button class="print-btn" onclick="printAllQR()" style="flex-shrink:0">🖨 طباعة QR</button>
        </div>
      </div>

      <input type="text" class="search-input" id="student-search" placeholder="🔍 بحث باسم الطالب…" oninput="renderStudentsList()">
      <div id="students-list">
        <div class="loading"><div class="spinner"></div>جاري التحميل…</div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- PRINT AREA -->
<div id="print-area"></div>

<!-- FIREBASE + LIBS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc, query, where, orderBy, serverTimestamp, Timestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ======= FIREBASE CONFIG — ضع config بتاعتك هنا =======
const firebaseConfig = {
  apiKey: "AIzaSyClTS9x2lqMoeuTbmC7Q7vl7zB3c5p25k8",
  authDomain: "attends-39e5b.firebaseapp.com",
  projectId: "attends-39e5b",
  storageBucket: "attends-39e5b.firebasestorage.app",
  messagingSenderId: "976453525685",
  appId: "1:976453525685:web:60b7207000ee20163d9efc"
};
// =========================================================

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ===== GLOBALS =====
let allStudents = [];
let todayAttendance = {};
let scanning = false;
let stream = null;
let scanInterval = null;
const todayKey = () => new Date().toISOString().slice(0,10);

// ===== AUTH =====
window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const err   = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'جاري الدخول…';
  err.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    err.textContent = 'بيانات خاطئة، حاول تاني';
    err.style.display = 'block';
    btn.disabled = false; btn.textContent = 'دخول';
  }
};

window.doLogout = async () => {
  stopScan();
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'flex';
    document.getElementById('user-email-display').textContent = user.email;
    initApp();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display  = 'none';
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'دخول';
  }
});

// ===== INIT =====
async function initApp() {
  setDateDisplay();
  await loadStudents();
  await loadTodayAttendance();
  renderTodayList();
}

function setDateDisplay() {
  const now = new Date();
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  document.getElementById('today-date').textContent =
    now.toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' });
  document.getElementById('today-day').textContent = days[now.getDay()];
}

// ===== STUDENTS =====
async function loadStudents() {
  const snap = await getDocs(query(collection(db,'students'), orderBy('name')));
  allStudents = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  updateStats();
  renderStudentsList();
}

window.addStudent = async () => {
  const name  = document.getElementById('new-name').value.trim();
  const grade = document.getElementById('new-grade').value.trim();
  if (!name) { showToast('اكتب اسم الطالب', 'error'); return; }
  const sid = 'STU-' + Date.now().toString(36).toUpperCase();
  await addDoc(collection(db,'students'), { name, grade, sid, createdAt: serverTimestamp() });
  document.getElementById('new-name').value = '';
  document.getElementById('new-grade').value = '';
  showToast('تمت الإضافة ✓', 'success');
  await loadStudents();
};

window.renderStudentsList = () => {
  const q = document.getElementById('student-search').value.trim().toLowerCase();
  const list = q ? allStudents.filter(s => s.name.includes(q)) : allStudents;
  const cont = document.getElementById('students-list');
  if (!list.length) {
    cont.innerHTML = `<div class="empty-state"><div class="empty-icon">👤</div>لا يوجد طلاب</div>`;
    return;
  }
  cont.innerHTML = list.map(s => {
    const initials = s.name.trim()[0] || '؟';
    return `<div class="qr-card">
      <div class="qr-img-wrap">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(s.id)}" loading="lazy">
      </div>
      <div class="qr-info">
        <div class="qr-name">${s.name}</div>
        <div class="qr-id">${s.sid || s.id}${s.grade ? ' • ' + s.grade : ''}</div>
      </div>
      <button class="print-btn" onclick="printOneQR('${s.id}','${s.name}','${s.sid||s.id}')">🖨</button>
    </div>`;
  }).join('');
};

// ===== ATTENDANCE =====
async function loadTodayAttendance() {
  const key = todayKey();
  const snap = await getDocs(query(collection(db,'attendance'), where('date','==',key)));
  todayAttendance = {};
  snap.docs.forEach(d => {
    const data = d.data();
    todayAttendance[data.studentId] = data.time || '—';
  });
  updateStats();
}

async function markPresent(studentId) {
  if (todayAttendance[studentId]) return false; // already
  const key = todayKey();
  const now = new Date();
  const timeStr = now.toLocaleTimeString('ar-EG', { hour:'2-digit', minute:'2-digit' });
  await addDoc(collection(db,'attendance'), {
    studentId,
    date: key,
    time: timeStr,
    timestamp: serverTimestamp()
  });
  todayAttendance[studentId] = timeStr;
  updateStats();
  renderTodayList();
  return true;
}

function renderTodayList() {
  const cont = document.getElementById('today-list');
  if (!allStudents.length) {
    cont.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>لا يوجد طلاب مسجلين بعد<br><small>أضف طلاب من تبويب "الطلاب"</small></div>`;
    return;
  }
  const sorted = [...allStudents].sort((a,b) => {
    const ap = !!todayAttendance[a.id], bp = !!todayAttendance[b.id];
    return bp - ap;
  });
  cont.innerHTML = sorted.map(s => {
    const present = !!todayAttendance[s.id];
    const time = todayAttendance[s.id] || '';
    const initials = s.name.trim()[0] || '؟';
    return `<div class="student-item ${present ? 'present' : ''}">
      <div class="student-avatar">${initials}</div>
      <div class="student-info">
        <div class="student-name">${s.name}</div>
        <div class="student-id">${s.grade || ''}</div>
        ${present ? `<div class="time-badge">⏰ ${time}</div>` : ''}
      </div>
      ${present ? '<span class="present-badge">✓ حاضر</span>' : ''}
    </div>`;
  }).join('');
}

function updateStats() {
  document.getElementById('stat-total').textContent   = allStudents.length;
  document.getElementById('stat-present').textContent = Object.keys(todayAttendance).length;
  document.getElementById('stat-absent').textContent  = allStudents.length - Object.keys(todayAttendance).length;
}

// ===== QR SCANNER =====
window.startScan = async () => {
  if (scanning) return;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('scanner-video');
    video.srcObject = stream;
    document.getElementById('scan-placeholder').style.display = 'none';
    document.getElementById('video-container').style.display  = 'block';
    document.getElementById('stop-btn').style.display = 'block';
    document.getElementById('scan-zone').classList.add('active');
    document.getElementById('scan-zone').onclick = null;
    scanning = true;

    // Use BarcodeDetector if available
    if ('BarcodeDetector' in window) {
      const detector = new BarcodeDetector({ formats: ['qr_code'] });
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      scanInterval = setInterval(async () => {
        if (!scanning || video.readyState < 2) return;
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        try {
          const codes = await detector.detect(canvas);
          if (codes.length > 0) handleQR(codes[0].rawValue);
        } catch {}
      }, 400);
    } else {
      // Fallback: load jsQR
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
      script.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        scanInterval = setInterval(() => {
          if (!scanning || video.readyState < 2) return;
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0);
          const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(img.data, img.width, img.height);
          if (code) handleQR(code.data);
        }, 350);
      };
      document.head.appendChild(script);
    }
  } catch(e) {
    showToast('تعذّر فتح الكاميرا', 'error');
  }
};

window.stopScan = () => {
  scanning = false;
  clearInterval(scanInterval);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  document.getElementById('scan-placeholder').style.display = 'flex';
  document.getElementById('video-container').style.display  = 'none';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('scan-zone').classList.remove('active');
  document.getElementById('scan-zone').onclick = () => window.startScan();
};

let lastScanned = null, lastScannedTime = 0;
async function handleQR(value) {
  const now = Date.now();
  if (value === lastScanned && now - lastScannedTime < 3000) return;
  lastScanned = value; lastScannedTime = now;

  const student = allStudents.find(s => s.id === value);
  if (!student) { showToast('QR غير معروف', 'error'); return; }

  if (todayAttendance[student.id]) {
    showToast(`${student.name} — مسجّل مسبقاً ✓`, 'info');
    return;
  }
  const ok = await markPresent(student.id);
  if (ok) {
    showToast(`✅ ${student.name} — تم التسجيل`, 'success');
    navigator.vibrate && navigator.vibrate([60,30,60]);
  }
}

// ===== EXPORT EXCEL =====
window.exportExcel = () => {
  const key = todayKey();
  const rows = [['الاسم', 'الصف', 'الحضور', 'وقت الحضور']];
  allStudents.forEach(s => {
    const present = !!todayAttendance[s.id];
    rows.push([s.name, s.grade || '', present ? '✓' : '', todayAttendance[s.id] || '']);
  });

  // Build CSV (UTF-8 BOM for Excel Arabic)
  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `حضور-${key}.csv`; a.click();
  URL.revokeObjectURL(url);
};

// ===== PRINT QR =====
window.printOneQR = (id, name, sid) => {
  const area = document.getElementById('print-area');
  area.innerHTML = `<div class="print-card">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(id)}">
    <div class="pname">${name}</div>
    <div class="pid">${sid}</div>
  </div>`;
  window.print();
};

window.printAllQR = () => {
  const area = document.getElementById('print-area');
  area.innerHTML = allStudents.map(s => `
    <div class="print-card">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(s.id)}">
      <div class="pname">${s.name}</div>
      <div class="pid">${s.sid || s.id}${s.grade ? ' • ' + s.grade : ''}</div>
    </div>`).join('');
  window.print();
};

// ===== TABS =====
window.switchTab = (tab, btn) => {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-attendance').style.display = tab === 'attendance' ? 'block' : 'none';
  document.getElementById('tab-students').style.display   = tab === 'students'   ? 'block' : 'none';
};

// ===== TOAST =====
let toastTimer;
window.showToast = (msg, type = 'info') => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 2800);
};
